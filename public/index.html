<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pipeline CI/CD</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #ffffff;
      --off:     #e8e4df;
      --mid:     #9e9890;
      --dim:     #5c574f;
      --accent:  #1aad8c;
      --accent2: #e8a022;
      --accent3: #c05c3a;
      --bg:      #0d0c0b;
      --nav-bg:  #f5f3f0;
      --nav-txt: #1a1815;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow: hidden;
    }

    /* ── NOISE TEXTURE ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 99;
    }

    /* ── BACKGROUND GRADIENT ── */
    .bg-visual {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 70% at 75% 55%, rgba(15,30,25,0.9) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 20% 40%, rgba(8,18,14,0.8) 0%, transparent 60%),
        linear-gradient(160deg, #0d0c0b 0%, #111410 40%, #0c1510 100%);
      z-index: 0;
    }

    /* Subtle vignette lines */
    .bg-visual::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 119px,
          rgba(255,255,255,0.012) 120px
        );
    }

    /* ── TOP NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 46px;
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      z-index: 50;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    nav .brand {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--nav-txt);
      letter-spacing: 0.02em;
      margin-right: 8px;
    }

    nav .sep { width: 1px; height: 18px; background: rgba(0,0,0,0.15); }

    nav .breadcrumb {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.05em;
    }

    nav .right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      color: #777;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    nav .cta-nav {
      background: var(--accent);
      color: #fff;
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s;
    }
    nav .cta-nav:hover { opacity: 0.85; }

    /* ── MAIN STAGE ── */
    .stage {
      position: relative;
      z-index: 10;
      height: 100vh;
      padding-top: 46px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding-left: clamp(32px, 6vw, 96px);
      padding-right: clamp(32px, 6vw, 96px);
    }

    /* ── META LINE ── */
    .meta {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: 0;
      animation: rise 0.7s ease forwards 0.2s;
    }
    .meta .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      vertical-align: middle;
      margin-right: 8px;
      box-shadow: 0 0 8px var(--accent);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 7vw, 88px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.0;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
      opacity: 0;
      animation: rise 0.8s ease forwards 0.4s;
    }

    /* ── BYLINE ── */
    .byline {
      font-size: 13px;
      color: var(--mid);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 44px;
      opacity: 0;
      animation: rise 0.7s ease forwards 0.6s;
    }
    .byline strong { color: var(--accent); font-weight: 500; }

    /* ── SCORE RINGS ── */
    .scores {
      display: flex;
      align-items: flex-end;
      gap: 28px;
      margin-bottom: 44px;
      opacity: 0;
      animation: rise 0.7s ease forwards 0.8s;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .ring-wrap {
      position: relative;
      width: 76px;
      height: 76px;
    }

    .ring-wrap svg {
      width: 76px;
      height: 76px;
      transform: rotate(-90deg);
    }

    .ring-wrap svg .track {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 3;
    }

    .ring-wrap svg .fill {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 188;
      stroke-dashoffset: 188;
      transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);
    }

    .ring-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
    }

    .score-label {
      font-size: 9.5px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      text-align: center;
    }

    /* ── BUTTONS ── */
    .actions {
      display: flex;
      gap: 12px;
      opacity: 0;
      animation: rise 0.7s ease forwards 1.0s;
    }

    .btn {
      padding: 11px 26px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.25);
      background: transparent;
      color: var(--white);
      transition: border-color 0.25s, background 0.25s, color 0.25s;
    }
    .btn:hover {
      border-color: var(--white);
      background: rgba(255,255,255,0.06);
    }
    .btn.filled {
      background: var(--white);
      color: var(--bg);
      border-color: var(--white);
    }
    .btn.filled:hover {
      background: var(--off);
    }

    /* ── RIGHT SIDE TOOLS ── */
    .tool-stack {
      position: fixed;
      right: 32px;
      bottom: 50%;
      transform: translateY(50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 20;
      opacity: 0;
      animation: rise 0.6s ease forwards 1.2s;
    }

    .tool-badge {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      cursor: default;
    }
    .tool-badge:hover {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
      transform: scale(1.08);
    }
    .tool-badge .count {
      position: absolute;
      top: -4px; right: -4px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      font-size: 8.5px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .tool-line {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.12), transparent);
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 clamp(32px, 6vw, 96px);
      border-top: 1px solid rgba(255,255,255,0.06);
      z-index: 20;
      opacity: 0;
      animation: rise 0.6s ease forwards 1.3s;
    }

    .bottom-bar .item {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-right: 32px;
    }
    .bottom-bar .item span {
      color: var(--mid);
    }

    .bottom-bar .actions-right {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }
    .icon-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      display: flex; align-items:center; justify-content:center;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .icon-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }

    @keyframes rise {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

<div class="bg-visual"></div>

<!-- TOP NAV -->
<nav>
  <span class="brand">DevOps</span>
  <div class="sep"></div>
  <span class="breadcrumb">Pipeline Status / Build #247 / Production</span>
  <div class="right">
    <span>Branch: main</span>
    <div class="sep"></div>
    <span id="clock">--:--:--</span>
    <button class="cta-nav">Ver Logs</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="stage">

  <div class="meta">
    <span class="dot"></span>
    Deploy concluído &nbsp;/&nbsp; <span id="date-str">—</span>
  </div>

  <h1 class="headline">Pipeline CI/CD<br>Funcionando!</h1>

  <p class="byline">
    via <strong>Jenkins</strong> &nbsp;+&nbsp; <strong>Docker</strong> &nbsp;+&nbsp; <strong>K3s</strong> &nbsp;·&nbsp; com score <strong>9.84</strong>
  </p>

  <!-- Actions -->
  <div class="actions">
    <button class="btn filled">Ver deploy</button>
    <button class="btn">Ver logs</button>
  </div>

</div>

<!-- RIGHT TOOL STACK -->
<div class="tool-stack">
  <div class="tool-badge" title="Jenkins" style="position:relative">⚙️<div class="count">✓</div></div>
  <div class="tool-badge" title="Docker">🐳</div>
  <div class="tool-line"></div>
  <div class="tool-badge" title="Kubernetes">☸️</div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="item">Build time: <span>1m 47s</span></div>
  <div class="item">Image: <span>app:v2.4.7</span></div>
  <div class="item">Cluster: <span>k3s-prod</span></div>
  <div class="item">Namespace: <span>default</span></div>
  <div class="actions-right">
    <div class="icon-btn">D</div>
    <div class="icon-btn">↗</div>
  </div>
</div>

<script>
  // Clock
  const clockEl = document.getElementById('clock');
  const dateEl  = document.getElementById('date-str');
  const now = new Date();
  dateEl.textContent = now.toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
  setInterval(() => { clockEl.textContent = new Date().toLocaleTimeString('pt-BR'); }, 1000);

  // Animate rings after page loads
  setTimeout(() => {
    document.querySelectorAll('.fill').forEach(circle => {
      const val = parseFloat(circle.dataset.val);
      const circumference = 188;
      const offset = circumference - (val / 10) * circumference;
      circle.style.strokeDashoffset = offset;
    });
  }, 900);
</script>
</body>
</html>
